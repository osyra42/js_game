<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
      body {
        background-color: #262626;
        color: #bbbbbb;
      }
      #canvas {
        background-color: #334433;
        padding-left: 0;
        padding-right: 0;
        margin-left: auto;
        margin-right: auto;
        display: block;
        width: 98%;
      }
    </style>
</head>
<body>
<canvas id="canvas" height="350" width="350">
  Your browser does not support the HTML5 canvas tag.
</canvas>

<script>
window.onload = function() {
  var canvas = document.getElementById("canvas");
  var context = canvas.getContext("2d");
  
  context.moveTo(0, 0);
  context.lineTo(350, 350);
  context.stroke();
};
  
</script>
</body>
</html>
